version: "3.9"

services:
  amnezia-wg-easy:
    image: ghcr.io/spcfox/amnezia-wg-easy
    container_name: amnezia-wg-easy
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - LANGUAGE=${AMNEZIA_LANGUAGE}
      - WG_HOST=${AMNEZIA_WG_HOST}
      - PASSWORD=${AMNEZIA_PASSWORD}
      - PORT=${AMNEZIA_PORT:-443}
      - WG_PORT=${AMNEZIA_WG_PORT:-443}
    ports:
      - "${AMNEZIA_PORT:-443}:${AMNEZIA_PORT:-443}/tcp"
      - "${AMNEZIA_WG_PORT:-443}:${AMNEZIA_WG_PORT:-443}/udp"
    volumes:
      - vpn_data:/etc/wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.conf.all.src_valid_mark: "1"
      net.ipv4.ip_forward: "1"
    devices:
      - "/dev/net/tun:/dev/net/tun"

volumes:
  vpn_data:
